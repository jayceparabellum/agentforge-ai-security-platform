services:
  - type: web
    name: agentforge-ai-security-platform
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: TARGET_BASE_URL
        value: https://openemr-js46.onrender.com
      - key: TARGET_ALLOWLIST
        value: https://openemr-js46.onrender.com
      - key: AGENTFORGE_CAMPAIGN_CADENCE
        value: weekly
      - key: CAMPAIGN_BUDGET_USD
        value: "2.50"
      - key: THREAT_INTEL_MAX_GENERATED_CASES
        value: "12"
      - key: NVD_KEYWORD_QUERY
        value: LLM AI machine learning

  - type: cron
    name: agentforge-weekly-campaign
    env: docker
    plan: starter
    schedule: "0 6 * * 1"
    dockerCommand: python -m agentforge.run_campaign --intensity scheduled
    envVars:
      - key: TARGET_BASE_URL
        value: https://openemr-js46.onrender.com
      - key: TARGET_ALLOWLIST
        value: https://openemr-js46.onrender.com
      - key: AGENTFORGE_CAMPAIGN_CADENCE
        value: weekly
      - key: CAMPAIGN_BUDGET_USD
        value: "2.50"
      - key: THREAT_INTEL_MAX_GENERATED_CASES
        value: "12"
      - key: NVD_KEYWORD_QUERY
        value: LLM AI machine learning

  - type: cron
    name: agentforge-threat-intel-refresh
    env: docker
    plan: starter
    schedule: "0 5 1,15 * *"
    dockerCommand: python -m agentforge.run_threat_intel
    envVars:
      - key: TARGET_BASE_URL
        value: https://openemr-js46.onrender.com
      - key: TARGET_ALLOWLIST
        value: https://openemr-js46.onrender.com
      - key: THREAT_INTEL_MAX_GENERATED_CASES
        value: "12"
      - key: NVD_KEYWORD_QUERY
        value: LLM AI machine learning
