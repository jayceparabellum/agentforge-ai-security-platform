<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #102033; }
      .h { font: 700 20px Arial, sans-serif; fill: #102033; }
      .t { font: 15px Arial, sans-serif; fill: #1f2933; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .box { stroke-width: 2; rx: 14; ry: 14; }
      .source { fill: #ffffff; stroke: #1d4ed8; }
